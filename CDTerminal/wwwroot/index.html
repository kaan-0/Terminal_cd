<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>CD Terminal</title>

    <base href="/" />
    <link href="CDTerminal.styles.css" rel="stylesheet" />
    <style>
        html,
        body,
        #app {
            width: 100%;
            height: 100%;
            min-height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            color: #e8f0f6;
            background: #07111d;
        }

        body {
            font-family: "Segoe UI", Arial, sans-serif;
        }
    </style>
</head>

<body>
    <div id="app">Cargando CD Terminal...</div>

    <script>
        window.cdTerminal = {
            scrollToBottom: function (element) {
                if (!element) {
                    return;
                }

                element.scrollTop = element.scrollHeight;
            }
        };
    </script>

    <script src="_framework/blazor.webview.js"></script>
</body>
</html>
